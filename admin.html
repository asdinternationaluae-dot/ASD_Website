<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ASD International</title>
  <link rel="icon" type="image/png" href="assets/ASD-LOGO.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .admin-container { max-width: 1200px; margin: 40px auto; padding: 20px; }
    .hidden { display: none !important; }
    .tabs { display: flex; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--color-border); }
    .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; }
    .tab.active { border-bottom: 2px solid var(--color-primary); color: var(--color-primary); }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th, .admin-table td { padding: 12px; border: 1px solid var(--color-border); text-align: left; }
    .admin-form { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: var(--color-surface); padding: 30px; border-radius: 8px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .flex-space { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .message-card { background: var(--color-surface); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--color-border); }
  </style>
</head>
<body>
  <!-- Login Section -->
  <div id="login-section" class="admin-container" style="max-width: 400px; margin-top: 100px;">
    <div style="text-align: center; margin-bottom: 30px;">
      <img src="assets/ASD-LOGO.png" alt="Logo" style="width: 150px; height: auto;">
      <h2>Admin Login</h2>
    </div>
    <form id="login-form" class="admin-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" required>
      </div>
      <p id="login-error" style="color: red; display: none;">Invalid credentials.</p>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>
  </div>

  <!-- Dashboard Section -->
  <div id="dashboard-section" class="admin-container hidden">
    <div class="flex-space">
      <h2>Admin Dashboard</h2>
      <button id="logout-btn" class="btn btn-ghost">Logout</button>
    </div>
    <div class="tabs">
      <div class="tab active" data-target="messages-tab">Messages</div>
      <div class="tab" data-target="products-tab">Products</div>
    </div>

    <!-- Messages Tab -->
    <div id="messages-tab" class="tab-content">
      <div class="flex-space">
        <h3>Client Messages</h3>
        <button id="clear-messages-btn" class="btn btn-ghost" style="color: red;">Clear All</button>
      </div>
      <div id="messages-list"></div>
    </div>

    <!-- Products Tab -->
    <div id="products-tab" class="tab-content hidden">
      <div class="flex-space">
        <h3>Manage Products</h3>
        <button id="add-product-btn" class="btn btn-primary">Add Product</button>
      </div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Product Modal -->
  <div id="product-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modal-title">Add/Edit Product</h3>
      <form id="product-form" class="admin-form" style="max-width: 100%;">
        <input type="hidden" id="prod-id">
        <div class="form-group"><label>Name *</label><input type="text" id="prod-name" required></div>
        <div class="form-group"><label>Category *</label><input type="text" id="prod-category" required></div>
        <div class="form-group"><label>Description</label><textarea id="prod-desc"></textarea></div>
        <div class="form-group"><label>Active Ingredients</label><input type="text" id="prod-ingredients"></div>
        <div class="form-group"><label>Recommended Dose</label><input type="text" id="prod-dose"></div>
        <div class="form-group"><label>Details (Markdown/Bullets)</label><textarea id="prod-details"></textarea></div>
        <div class="form-group"><label>Tags (comma separated)</label><input type="text" id="prod-tags"></div>
        <div class="form-group">
          <label>Image Upload</label>
          <input type="file" id="prod-image-file" accept="image/*">
          <input type="hidden" id="prod-image">
          <img id="prod-image-preview" src="" style="max-width: 100px; margin-top: 10px; display: none;">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button type="submit" class="btn btn-primary">Save Product</button>
          <button type="button" id="close-modal-btn" class="btn btn-ghost">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/admin.js"></script>
</body>
</html>
